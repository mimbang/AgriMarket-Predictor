name: Model Maintenance (Daily)

on:
  schedule:
    # Se lance tous les jours à minuit
    - cron: '0 0 * * *'
  workflow_dispatch: # Permet de cliquer sur un bouton pour tester

jobs:
  update_model:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # - name: 🔍 Debug Directory Structure
      #   run: |
      #     echo "📍 Répertoire actuel : $(pwd)"
      #     echo "📂 Contenu du répertoire :"
      #     ls -R
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r BACKEND/requirements.txt

      - name: Run maintenance script
        env:
          # C'est ici qu'on lie la base de données
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # On lance le script qui contient tes fonctions de retraining
          python -m BACKEND.scripts.worker 

      - name: Commit and Push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"

          # On récupère la date actuelle au format YYYY-MM-DD
          DATA_DATE=$(date +'%Y-%m-%d')
          
          # On cherche les fichiers .pkl peu importe où ils sont dans BACKEND
          # Le "|| true" évite que le script s'arrête si aucun fichier n'est trouvé
          git add BACKEND/brain/*.pkl || true
          
          # On vérifie s'il y a vraiment des changements avant de commit
          if git diff --cached --quiet; then
            echo "Pas de changements détectés dans les modèles .pkl"
          else
            git commit -m " [AUTO] Mise à jour du modèle IA - $DATA_DATE"
            git push
          fi