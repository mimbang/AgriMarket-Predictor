version: '3.8'
services:
  db:
    image: postgres:15
    container_name: agri_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-agri_database}
    ports: # <-- Vérifie qu'il n'y a pas d'espace ici
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # On teste si postgres est prêt à accepter des connexions
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      
  api:
    build: BACKEND
    container_name: agri_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
# ICI : On lie le dossier local BACKEND/app au dossier /app/app du conteneur
      - ./BACKEND/app:/app/app
      - ./BACKEND/brain:/app/brain
      - ./BACKEND/scripts:/app/scripts


volumes:
  postgres_data: