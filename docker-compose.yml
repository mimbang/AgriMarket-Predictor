version: '3.8'

services:
  db:
    image: postgres:15
    container_name: agri_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-agri_database}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-agri_database}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: BACKEND
    container_name: agri_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
# ICI : On lie le dossier local BACKEND/app au dossier /app/app du conteneur
      - ./BACKEND/app:/app/app
      - ./BACKEND/brain:/app/brain
      - ./BACKEND/scripts:/app/scripts


volumes:
  postgres_data: